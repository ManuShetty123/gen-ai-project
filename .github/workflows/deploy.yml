name: CI/CD Pipeline — Build, Test, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/my-node-app
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — TEST
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        # `npm ci` is preferred over `npm install` in CI:
        # - Installs exact versions from package-lock.json
        # - Fails if lock file is out of sync
        # - Faster and more reliable in CI environments

      - name: Run linter
        run: npm run lint
        continue-on-error: false # Fail the pipeline if linting fails

      - name: Run unit tests
        run: npm test -- --coverage --forceExit
        env:
          NODE_ENV: test
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail (useful for debugging)
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — BUILD DOCKER IMAGE & PUSH TO DOCKERHUB
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test # Only runs if the 'test' job succeeds
    if: github.ref == 'refs/heads/main' # Only on pushes to main (not PRs)

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables advanced features: multi-platform builds, cache exports

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # Using a token (not password) is best practice for security

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          # Tags the image with: latest + the short git SHA (e.g. sha-a1b2c3d)
          # Example: myuser/my-node-app:latest AND myuser/my-node-app:sha-a1b2c3d

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max

      - name: Verify image was pushed
        run: |
          echo "✅ Image pushed successfully"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  # ─────────────────────────────────────────────
  # JOB 3 — DEPLOY TO EC2
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push # Only runs after Docker image is pushed
    environment: production # Requires manual approval if configured in GitHub

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Add EC2 host to known_hosts to prevent interactive prompts
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
        # NEVER log or echo the private key value

      - name: Deploy to EC2 via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'

            set -e  # Exit immediately if any command fails

            echo "📦 Pulling latest Docker image..."
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "🛑 Stopping existing container (if any)..."
            docker stop my-node-app 2>/dev/null || true
            docker rm   my-node-app 2>/dev/null || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name my-node-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              ${{ env.DOCKER_IMAGE }}:latest

            echo "⏳ Waiting for app to start..."
            sleep 5

            echo "🩺 Health check..."
            curl --silent --fail http://localhost/health || {
              echo "❌ Health check failed! Rolling back..."
              docker stop my-node-app
              docker rm   my-node-app
              exit 1
            }

            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            echo "✅ Deployment successful!"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "🔴 Deployment FAILED for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Triggered by: ${{ github.actor }}"
          # TODO: Add Slack/email notification here
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          #   -H 'Content-type: application/json' \
          #   --data '{"text":"🚨 Deployment failed for ${{ github.repository }}"}'

      - name: Notify on success
        if: success()
        run: |
          echo "🟢 Deployment SUCCEEDED for commit ${{ github.sha }}"