name: CI/CD Pipeline — Build, Test, Push & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: manuusingdocker/my-node-app
  NODE_VERSION: "24"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — TEST
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: false

      - name: Run unit tests
        run: npm test -- --coverage --forceExit
        env:
          NODE_ENV: test
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2 — BUILD DOCKER IMAGE & PUSH TO DOCKERHUB
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: manuusingdocker
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: manuusingdocker/my-node-app
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was pushed
        run: |
          echo "✅ Image pushed successfully"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  # ─────────────────────────────────────────────
  # JOB 3 — DEPLOY TO EC2
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'

            set -e

            echo "📦 Pulling latest Docker image..."
            docker pull manuusingdocker/my-node-app:latest

            echo "🛑 Stopping existing container (if any)..."
            docker stop my-node-app 2>/dev/null || true
            docker rm   my-node-app 2>/dev/null || true

            echo "🚀 Starting new container..."
            docker run -d \
              --name my-node-app \
              --restart unless-stopped \
              -p 80:3000 \
              -e NODE_ENV=production \
              -e PORT=3000 \
              manuusingdocker/my-node-app:latest

            echo "⏳ Waiting for app to start..."
            sleep 5

            echo "🩺 Health check..."
            curl --silent --fail http://localhost/health || {
              echo "❌ Health check failed! Rolling back..."
              docker stop my-node-app
              docker rm   my-node-app
              exit 1
            }

            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f

            echo "✅ Deployment successful!"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "🔴 Deployment FAILED for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Triggered by: ${{ github.actor }}"

      - name: Notify on success
        if: success()
        run: |
          echo "🟢 Deployment SUCCEEDED for commit ${{ github.sha }}"